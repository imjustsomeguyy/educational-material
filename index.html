<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Barcode Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #1a1f1c;
  color: #dfeee0;
  margin: 0;
  padding: 1rem;
  text-align: center;
  transition: all 0.4s ease;
}

/* container */
.container {
  background: #222827;
  padding: 1.5rem;
  border-radius: 1rem;
  max-width: 450px;
  margin: auto;
}

/* inputs/buttons */
input, button {
  padding: 0.6rem;
  margin: 0.5rem 0;
  font-size: 0.8rem;
  border-radius: 0.5rem;
  border: none;
}

button.price-button {
  background: #68b06a;
  color: #fff;
  cursor: pointer;
}

/* barcode */
.barcode-frame {
  background: #e6efe7;
  padding: 1rem;
  border-radius: 0.8rem;
  margin-top: 1rem;
}

.watermark {
  font-size: 0.5rem;
}

/* ===== THEME BUTTON ===== */
.theme-btn {
  margin-top: 1rem;
  background: #2a2f2d;
  color: #fff;
  cursor: pointer;
}

/* ===== PANEL ===== */
.theme-panel {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(120%);
  background: #222827;
  padding: 1rem;
  border-radius: 1rem;
  width: 300px;
  transition: all 0.4s ease;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

.theme-panel.open {
  transform: translateX(-50%) translateY(0);
}

/* toggle row */
.mode-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.mode-btn {
  flex: 1;
  margin: 0 5px;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
  background: #333;
}

.mode-btn.active {
  outline: 2px solid #68b06a;
}

/* colour grid */
.color-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.color {
  width: 100%;
  padding-top: 100%;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
}

.color.active::after {
  content: "";
  position: absolute;
  inset: -3px;
  border: 2px solid white;
  border-radius: 12px;
}

/* color presets */
.c-default { background:#222827; }
.c-green { background:#1f3d2b; }
.c-blue { background:#1c2f4a; }
.c-red { background:#4a1c1c; }
.c-orange { background:#4a2f1c; }
.c-purple { background:#2f1c4a; }
.c-teal { background:#1c4a46; }

/* LIGHT MODE */
body.light {
  background:#f3faf4;
  color:#1f2b21;
}

body.light .container {
  background:#fff;
}

</style>
</head>

<body>

<div class="container">

<h3>Barcode Generator</h3>

<input id="productCode" placeholder="Product code">
<input id="price" placeholder="Price">

<button onclick="generate()">Generate</button>

<div class="barcode-frame">
<canvas id="barcode"></canvas>
<div class="watermark">tiny watermark text</div>
</div>

<button class="theme-btn" onclick="togglePanel()">Theme 🎨</button>

</div>

<!-- PANEL -->
<div id="themePanel" class="theme-panel">

<div class="mode-row">
<div class="mode-btn active" onclick="setMode('dark', this)">Dark</div>
<div class="mode-btn" onclick="setMode('light', this)">Light</div>
</div>

<div class="color-grid">
<div class="color c-default active" onclick="setColor('default', this)"></div>
<div class="color c-green" onclick="setColor('green', this)"></div>
<div class="color c-blue" onclick="setColor('blue', this)"></div>
<div class="color c-red" onclick="setColor('red', this)"></div>
<div class="color c-orange" onclick="setColor('orange', this)"></div>
<div class="color c-purple" onclick="setColor('purple', this)"></div>
<div class="color c-teal" onclick="setColor('teal', this)"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<script>
function generate(){
  let code = document.getElementById("productCode").value;
  JsBarcode("#barcode", code, {format:"CODE128"});
}

/* panel */
function togglePanel(){
  document.getElementById("themePanel").classList.toggle("open");
}

/* mode */
function setMode(mode, el){
  document.body.classList.remove("light");
  if(mode === "light") document.body.classList.add("light");

  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

/* color */
function setColor(color, el){
  document.body.dataset.color = color;

  document.querySelectorAll(".color").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");

  applyTheme();
}

/* apply combined theme */
function applyTheme(){
  let color = document.body.dataset.color;

  let map = {
    default:"#222827",
    green:"#1f3d2b",
    blue:"#1c2f4a",
    red:"#4a1c1c",
    orange:"#4a2f1c",
    purple:"#2f1c4a",
    teal:"#1c4a46"
  };

  document.querySelector(".container").style.background = map[color];
}
</script>

</body>
</html>
