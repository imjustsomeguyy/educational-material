<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sainsbury's Barcode Generator - 55</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #1a1f1c;
  color: #dfeee0;
  margin: 0;
  padding: 1rem;
  text-align: center;
  transition: all 0.3s ease;
}

.container {
  background: #222827;
  color: #dfeee0;
  padding: 1.5rem;
  border-radius: 1rem;
  max-width: 450px;
  margin: auto;
  box-shadow: 0 20px rgba(0,0,0,0.5);
  position: relative;
}

img {
  max-width: 100%;
  height: auto;
}

input, button {
  padding: 0.6rem;
  margin: 0.5rem 0;
  font-size: 0.8rem;
  border-radius: 0.5rem;
  border: none;
}

input[type="text"], input[type="number"] {
  width: calc(100% - 1rem);
}

button.price-button {
  background: #68b06a;
  color: #ffffff;
  cursor: pointer;
}

.barcode-frame {
  background: #e6efe7;
  padding: 1rem;
  border-radius: 0.8rem;
  margin-top: 1rem;
}

.barcode-label {
  font-size: 0.9rem;
  margin-bottom: 0.3rem;
  color: #1f2b21;
  font-weight: bold;
}

.watermark {
  font-size: 0.5rem;
  color: #6b7c6e;
}

.socials {
  margin-top: 1rem;
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

.social-item {
  background: #2a2f2d;
  padding: 0.5rem 0.8rem;
  border-radius: 0.6rem;
  cursor: pointer;
  font-size: 0.8rem;
}

.bottom-image {
  margin-top: 15px;
  max-width: 120px;
}

/* ===== THEME BUTTON ===== */
.theme-btn {
  background: #2a2f2d;
  color: #fff;
  margin-top: 1rem;
  cursor: pointer;
}

/* ===== DROPDOWN PANEL ===== */
.theme-panel {
  position: absolute;
  top: calc(100% - 10px);
  left: 50%;
  transform: translateX(-50%) scale(0.95);
  opacity: 0;
  background: #222827;
  padding: 10px;
  border-radius: 12px;
  width: 220px;
  transition: all 0.25s ease;
  pointer-events: none;
}

.theme-panel.open {
  opacity: 1;
  transform: translateX(-50%) scale(1);
  pointer-events: all;
}

/* mode buttons */
.mode-row {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}

.mode-btn {
  flex: 1;
  padding: 6px;
  border-radius: 8px;
  background: #333;
  cursor: pointer;
}

.mode-btn.active {
  outline: 2px solid #68b06a;
}

/* colors */
.color-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 6px;
}

.color {
  width: 100%;
  padding-top: 100%;
  border-radius: 8px;
  cursor: pointer;
  position: relative;
}

.color.active::after {
  content:"";
  position:absolute;
  inset:-2px;
  border:2px solid white;
  border-radius:10px;
}

/* color presets */
.c-default {background:#222827;}
.c-green {background:#1f3d2b;}
.c-blue {background:#1c2f4a;}
.c-red {background:#4a1c1c;}
.c-orange {background:#4a2f1c;}
.c-purple {background:#2f1c4a;}
.c-teal {background:#1c4a46;}

/* light mode */
body.light-mode {
  background:#f3faf4;
  color:#1f2b21;
}

body.light-mode .container {
  background:#ffffff;
  color:#1f2b21;
}
</style>
</head>

<body>

<div class="container">

<img src="Sainsbury's_idRe1DHyjA_1.png" />

<input type="text" id="productCode" placeholder="Enter barcode" />
<input type="text" id="barcodeLabelInput" placeholder="Label" />

<div>
<button class="price-button" onclick="setPriceAndGenerate(10)">10p</button>
<button class="price-button" onclick="setPriceAndGenerate(49)">49p</button>
<button class="price-button" onclick="setPriceAndGenerate(100)">£1</button>
<button class="price-button" onclick="showCustomPrice()">Custom</button>
</div>

<div id="customPriceContainer" style="display:none;">
<input type="number" id="price" placeholder="Price" />
<button onclick="generateBarcode()">Generate</button>
</div>

<div class="barcode-frame">
<div id="barcodeLabel"></div>
<canvas id="barcodeCanvas"></canvas>
<div class="watermark">EasyP55 little fraud boy bbancm</div>
</div>

<div class="socials">
<div class="social-item" onclick="copyText('imjustsomeguyy', this)">imjustsomeguyy</div>
<div class="social-item" onclick="copyText('somerandomahguy', this)">somerandomahguy</div>
</div>

<!-- BUTTON -->
<button class="theme-btn" onclick="toggleThemeMenu()">Theme</button>

<!-- PANEL -->
<div id="themePanel" class="theme-panel">

<div class="mode-row">
<div class="mode-btn active" onclick="setMode('dark', this)"></div>
<div class="mode-btn" onclick="setMode('light', this)"></div>
</div>

<div class="color-grid">
<div class="color c-default active" onclick="setColor('default', this)"></div>
<div class="color c-green" onclick="setColor('green', this)"></div>
<div class="color c-blue" onclick="setColor('blue', this)"></div>
<div class="color c-red" onclick="setColor('red', this)"></div>
<div class="color c-orange" onclick="setColor('orange', this)"></div>
<div class="color c-purple" onclick="setColor('purple', this)"></div>
<div class="color c-teal" onclick="setColor('teal', this)"></div>
</div>

</div>

<img src="methodtriad.png" class="bottom-image" />

</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<script>
function toggleThemeMenu(){
  document.getElementById("themePanel").classList.toggle("open");
}

function setMode(mode, el){
  document.body.classList.toggle("light-mode", mode==="light");
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

function setColor(color, el){
  document.querySelectorAll(".color").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");

  const map = {
    default:"#222827",
    green:"#1f3d2b",
    blue:"#1c2f4a",
    red:"#4a1c1c",
    orange:"#4a2f1c",
    purple:"#2f1c4a",
    teal:"#1c4a46"
  };

  document.querySelector(".container").style.background = map[color];
}
</script>

</body>
</html>
