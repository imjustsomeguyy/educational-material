<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sainsbury's Barcode Generator - 55</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #1a1f1c;
  color: #dfeee0;
  margin: 0;
  padding: 1rem;
  text-align: center;
  transition: all 0.3s ease;
}

/* BLUR BACKDROP */
.backdrop {
  position: fixed;
  inset: 0;
  backdrop-filter: blur(6px);
  background: rgba(0,0,0,0.3);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

.backdrop.active {
  opacity: 1;
  pointer-events: all;
}

.container {
  background: #222827;
  padding: 1.5rem;
  border-radius: 1rem;
  max-width: 450px;
  margin: auto;
  box-shadow: 0 20px rgba(0,0,0,0.5);
  position: relative;
}

img {
  max-width: 100%;
}

input, button {
  padding: 0.6rem;
  margin: 0.5rem 0;
  font-size: 0.8rem;
  border-radius: 0.5rem;
  border: none;
}

button.price-button {
  background: #68b06a;
  color: #fff;
  cursor: pointer;
}

.barcode-frame {
  background: #e6efe7;
  padding: 1rem;
  border-radius: 0.8rem;
  margin-top: 1rem;
}

.watermark {
  font-size: 0.5rem;
}

.socials {
  margin-top: 1rem;
  display: flex;
  justify-content: center;
  gap: 15px;
}

.social-item {
  background: #2a2f2d;
  padding: 0.5rem 0.8rem;
  border-radius: 0.6rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}

.copy-msg {
  font-size: 0.7rem;
  color: #68b06a;
  display: none;
}

/* THEME BUTTON */
.theme-btn {
  background: #2a2f2d;
  color: #fff;
  margin-top: 1rem;
  cursor: pointer;
}

/* MODERN PANEL */
.theme-panel {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  opacity: 0;
  background: rgba(34,40,39,0.85);
  backdrop-filter: blur(12px);
  padding: 12px;
  border-radius: 16px;
  width: 240px;
  transition: all 0.25s ease;
  pointer-events: none;
}

.theme-panel.open {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: all;
}

/* MODE */
.mode-row {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}

.mode-btn {
  flex: 1;
  height: 28px;
  border-radius: 10px;
  background: #333;
  cursor: pointer;
}

.mode-btn.active {
  outline: 2px solid #68b06a;
}

/* COLORS */
.color-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 8px;
}

.color {
  width: 100%;
  padding-top: 100%;
  border-radius: 50%;
  cursor: pointer;
  position: relative;
}

.color.active::after {
  content:"";
  position:absolute;
  inset:-3px;
  border:2px solid white;
  border-radius:50%;
}

/* COLORS */
.c-default{background:#222827;}
.c-green{background:#1f3d2b;}
.c-blue{background:#1c2f4a;}
.c-red{background:#4a1c1c;}
.c-orange{background:#4a2f1c;}
.c-purple{background:#2f1c4a;}
.c-teal{background:#1c4a46;}

/* LIGHT MODE */
body.light-mode {
  background:#f3faf4;
  color:#1f2b21;
}
body.light-mode .container {
  background:#fff;
  color:#1f2b21;
}
</style>
</head>

<body>

<div id="backdrop" class="backdrop" onclick="closeMenu()"></div>

<div class="container">

<img src="Sainsbury's_idRe1DHyjA_1.png">

<input id="productCode" placeholder="Enter barcode">
<input id="barcodeLabelInput" placeholder="Label">

<div>
<button class="price-button" onclick="setPriceAndGenerate(10)">10p</button>
<button class="price-button" onclick="setPriceAndGenerate(49)">49p</button>
<button class="price-button" onclick="setPriceAndGenerate(100)">£1</button>
<button class="price-button" onclick="showCustomPrice()">Custom</button>
</div>

<div id="customPriceContainer" style="display:none;">
<input id="price" type="number" placeholder="Price">
<button onclick="generateBarcode()">Generate</button>
</div>

<div class="barcode-frame">
<div id="barcodeLabel"></div>
<canvas id="barcodeCanvas"></canvas>
<div class="watermark">EasyP55 little fraud boy bbancm</div>
</div>

<!-- SOCIALS RESTORED -->
<div class="socials">

<div class="social-item" onclick="copyText('imjustsomeguyy', this)">
<svg width="18" height="18" viewBox="0 0 24 24" fill="#5865F2">
<path d="M20 4a16 16 0 0 0-4-1l-.2.4..."/>
</svg>
imjustsomeguyy
<span class="copy-msg">Copied!</span>
</div>

<div class="social-item" onclick="copyText('somerandomahguy', this)">
<svg width="18" height="18" viewBox="0 0 24 24" fill="#FFFC00">
<path d="M12 2c2.5 0 4.5 2 4.5 4.5..."/>
</svg>
somerandomahguy
<span class="copy-msg">Copied!</span>
</div>

</div>

<button class="theme-btn" onclick="toggleMenu()">Theme</button>

<!-- MODERN PANEL -->
<div id="themePanel" class="theme-panel">

<div class="mode-row">
<div class="mode-btn active" onclick="setMode('dark',this)"></div>
<div class="mode-btn" onclick="setMode('light',this)"></div>
</div>

<div class="color-grid">
<div class="color c-default active" onclick="setColor('default',this)"></div>
<div class="color c-green" onclick="setColor('green',this)"></div>
<div class="color c-blue" onclick="setColor('blue',this)"></div>
<div class="color c-red" onclick="setColor('red',this)"></div>
<div class="color c-orange" onclick="setColor('orange',this)"></div>
<div class="color c-purple" onclick="setColor('purple',this)"></div>
<div class="color c-teal" onclick="setColor('teal',this)"></div>
</div>

</div>

<img src="methodtriad.png" class="bottom-image">

</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<script>
function toggleMenu(){
  document.getElementById("themePanel").classList.toggle("open");
  document.getElementById("backdrop").classList.toggle("active");
}

function closeMenu(){
  document.getElementById("themePanel").classList.remove("open");
  document.getElementById("backdrop").classList.remove("active");
}

function setMode(mode, el){
  document.body.classList.toggle("light-mode", mode==="light");
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

function setColor(color, el){
  document.querySelectorAll(".color").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");

  const map={
    default:"#222827",
    green:"#1f3d2b",
    blue:"#1c2f4a",
    red:"#4a1c1c",
    orange:"#4a2f1c",
    purple:"#2f1c4a",
    teal:"#1c4a46"
  };

  document.querySelector(".container").style.background=map[color];
}

/* COPY RESTORED */
function copyText(text, el) {
  navigator.clipboard.writeText(text);
  const msg = el.querySelector(".copy-msg");
  msg.style.display = "inline";
  setTimeout(() => msg.style.display = "none", 1200);
}
</script>

</body>
</html>
