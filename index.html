<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sainsbury's Barcode Generator - 55</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #1a1f1c;
      --card: #222827;
      --text: #dfeee0;
      --text-sub: #6b7c6e;
      --accent: #68b06a;
      --accent-hover: #4f9a52;
      --btn-bg: #2a2f2d;
      --btn-border: #555;
      --barcode-bg: #e6efe7;
      --barcode-text: #1f2b21;
      --social-bg: #2a2f2d;
      --social-hover: #3a413f;
      --logo-filter: brightness(1.15) saturate(1.2);
    }

    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1rem;
      text-align: center;
      transition: background 0.4s, color 0.4s;
    }

    .container {
      background: var(--card);
      color: var(--text);
      padding: 1.5rem;
      border-radius: 1rem;
      max-width: 450px;
      margin: auto;
      box-shadow: 0 20px rgba(0,0,0,0.5);
      transition: background 0.4s, color 0.4s;
    }

    #sainsburysLogo {
      max-width: 100%;
      height: auto;
      filter: var(--logo-filter);
      transition: filter 0.5s;
    }

    input, button {
      padding: 0.6rem;
      margin: 0.5rem 0;
      font-size: 0.8rem;
      border-radius: 0.5rem;
      border: none;
    }

    input[type="text"], input[type="number"] {
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--btn-border);
      transition: background 0.3s, color 0.3s;
    }

    input::placeholder { color: var(--text-sub); }

    /* ── Barcode input row ── */
    .input-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin: 0.5rem 0;
    }

    .input-row input[type="text"] {
      flex: 1;
      margin: 0;
      width: 0; /* flex overrides */
    }

    .scan-btn {
      flex-shrink: 0;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      padding: 0.55rem 0.65rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
      margin: 0;
    }

    .scan-btn:hover {
      background: var(--accent-hover);
      transform: scale(1.05);
    }

    button.price-button {
      background: var(--accent);
      color: #ffffff;
      margin: 0.3rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.price-button:hover { background: var(--accent-hover); }

    .barcode-frame {
      background: var(--barcode-bg);
      padding: 1rem;
      border-radius: 0.8rem;
      margin-top: 1rem;
      transition: background 0.4s;
    }

    .barcode-label {
      font-size: 0.9rem;
      margin-bottom: 0.3rem;
      color: var(--barcode-text);
      font-weight: bold;
    }

    .barcode-price {
      font-size: 1rem;
      margin-top: 0.45rem;
      color: var(--barcode-text);
      font-weight: 700;
      letter-spacing: 0.04em;
      min-height: 1.3em;
    }

    canvas { max-width: 100%; }

    .watermark {
      color: var(--text-sub);
      margin-top: 0.5rem;
      font-size: 0.72rem;
      line-height: 1.55;
    }

    .socials {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .social-item {
      background: var(--social-bg);
      padding: 0.5rem 0.8rem;
      border-radius: 0.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      transition: background 0.2s;
    }

    .social-item:hover { background: var(--social-hover); }

    .copy-msg {
      font-size: 0.7rem;
      color: var(--accent);
      display: none;
    }

    .bottom-row {
      margin-top: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .themes-btn {
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--btn-border);
      border-radius: 0.6rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      margin: 0;
      transition: background 0.2s, transform 0.15s;
    }

    .themes-btn:hover {
      background: var(--social-hover);
      transform: scale(1.03);
    }

    .triad-img {
      width: 50px;
      height: auto;
      opacity: 0.82;
      filter: var(--logo-filter);
      transition: filter 0.5s, opacity 0.3s;
    }

    .triad-img:hover { opacity: 1; }

    /* ════════════════════════════════════════
       CAMERA SCANNER MODAL
    ════════════════════════════════════════ */
    .scanner-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .scanner-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .scanner-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -46%) scale(0.9);
      z-index: 201;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1.3rem;
      padding: 1.4rem;
      width: min(380px, 92vw);
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(.22,1,.36,1);
    }

    .scanner-modal.open {
      opacity: 1;
      pointer-events: all;
      transform: translate(-50%, -50%) scale(1);
    }

    .scanner-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .scanner-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .scanner-close {
      background: none;
      border: none;
      color: var(--text-sub);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      border-radius: 0.4rem;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
      margin: 0;
    }

    .scanner-close:hover {
      color: var(--text);
      background: rgba(128,128,128,0.12);
    }

    /* Video feed wrapper */
    .video-wrap {
      position: relative;
      width: 100%;
      border-radius: 0.9rem;
      overflow: hidden;
      background: #000;
      aspect-ratio: 4/3;
    }

    #scannerVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Animated scan line */
    .scan-line {
      position: absolute;
      left: 8%;
      width: 84%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      box-shadow: 0 0 8px var(--accent);
      animation: scanline 2s ease-in-out infinite;
      top: 50%;
    }

    @keyframes scanline {
      0%   { top: 15%; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 85%; opacity: 0; }
    }

    /* Corner guides */
    .scan-guide {
      position: absolute;
      inset: 10%;
      pointer-events: none;
    }

    .scan-guide::before,
    .scan-guide::after,
    .scan-guide-inner::before,
    .scan-guide-inner::after {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.85;
    }

    .scan-guide::before       { top: 0;    left: 0;   border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .scan-guide::after        { top: 0;    right: 0;  border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .scan-guide-inner::before { bottom: 0; left: 0;   border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .scan-guide-inner::after  { bottom: 0; right: 0;  border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    /* Status text below video */
    .scanner-status {
      margin-top: 0.85rem;
      font-size: 0.8rem;
      color: var(--text-sub);
      min-height: 1.4em;
      transition: color 0.3s;
    }

    .scanner-status.success {
      color: var(--accent);
      font-weight: 600;
    }

    .scanner-status.error {
      color: #e05555;
    }

    /* Camera select (if multiple cameras) */
    .camera-select-wrap {
      margin-top: 0.7rem;
    }

    #cameraSelect {
      width: 100%;
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--btn-border);
      border-radius: 0.5rem;
      padding: 0.5rem;
      font-size: 0.78rem;
      cursor: pointer;
      margin: 0;
    }

    /* ════════════════════════════════════════
       THEME PANEL
    ════════════════════════════════════════ */
    .theme-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .theme-overlay.open { opacity: 1; pointer-events: all; }

    .theme-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -46%) scale(0.88);
      z-index: 101;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 1.3rem;
      padding: 1.5rem 1.3rem;
      width: min(420px, 92vw);
      box-shadow: 0 30px 80px rgba(0,0,0,0.65);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(.22,1,.36,1);
    }

    .theme-panel.open {
      opacity: 1;
      pointer-events: all;
      transform: translate(-50%, -50%) scale(1);
    }

    .theme-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .theme-panel-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .theme-close {
      background: none;
      border: none;
      color: var(--text-sub);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      border-radius: 0.4rem;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
      margin: 0;
    }

    .theme-close:hover { color: var(--text); background: rgba(128,128,128,0.12); }

    .theme-section-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-sub);
      text-align: left;
      margin: 0.8rem 0 0.4rem;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0.45rem;
    }

    .theme-card {
      border-radius: 0.7rem;
      padding: 0.5rem 0.25rem;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.18s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }

    .theme-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(104,176,106,0.22);
    }

    .theme-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.28);
    }

    .theme-swatch-half { position: absolute; top: 0; width: 50%; height: 100%; }
    .theme-swatch-left  { left: 0; }
    .theme-swatch-right { right: 0; }

    /* Swatch colours */
    [data-theme="forest"]   { background:#1e2922; } [data-theme="forest"]   .theme-swatch-left{background:#1a1f1c;} [data-theme="forest"]   .theme-swatch-right{background:#68b06a;}
    [data-theme="ocean"]    { background:#111a28; } [data-theme="ocean"]    .theme-swatch-left{background:#0d1520;} [data-theme="ocean"]    .theme-swatch-right{background:#3a8eff;}
    [data-theme="violet"]   { background:#1c1428; } [data-theme="violet"]   .theme-swatch-left{background:#130e1f;} [data-theme="violet"]   .theme-swatch-right{background:#a066e8;}
    [data-theme="ember"]    { background:#251410; } [data-theme="ember"]    .theme-swatch-left{background:#1c0e0a;} [data-theme="ember"]    .theme-swatch-right{background:#e8572a;}
    [data-theme="arctic"]   { background:#0d1e22; } [data-theme="arctic"]   .theme-swatch-left{background:#091518;} [data-theme="arctic"]   .theme-swatch-right{background:#00c4b4;}
    [data-theme="obsidian"] { background:#1a1c20; } [data-theme="obsidian"] .theme-swatch-left{background:#141618;} [data-theme="obsidian"] .theme-swatch-right{background:#a0aec0;}
    [data-theme="mint"]     { background:#e8f5ea; } [data-theme="mint"]     .theme-swatch-left{background:#f3faf4;} [data-theme="mint"]     .theme-swatch-right{background:#2e9e58;}
    [data-theme="golden"]   { background:#fdf3e3; } [data-theme="golden"]   .theme-swatch-left{background:#fffaf2;} [data-theme="golden"]   .theme-swatch-right{background:#d97a18;}
    [data-theme="cherry"]   { background:#fce8ef; } [data-theme="cherry"]   .theme-swatch-left{background:#fff0f5;} [data-theme="cherry"]   .theme-swatch-right{background:#e0436a;}
    [data-theme="lavender"] { background:#f0ecfc; } [data-theme="lavender"] .theme-swatch-left{background:#f8f5ff;} [data-theme="lavender"] .theme-swatch-right{background:#7c4ddb;}
    [data-theme="peach"]    { background:#fef0e8; } [data-theme="peach"]    .theme-swatch-left{background:#fff7f2;} [data-theme="peach"]    .theme-swatch-right{background:#e8733a;}
    [data-theme="sky"]      { background:#e8f4fc; } [data-theme="sky"]      .theme-swatch-left{background:#f0f8ff;} [data-theme="sky"]      .theme-swatch-right{background:#1a90d4;}

    /* Theme variable overrides */
    body.theme-forest   { --bg:#1a1f1c; --card:#222827; --text:#dfeee0; --text-sub:#6b7c6e; --accent:#68b06a; --accent-hover:#4f9a52; --btn-bg:#2a2f2d; --btn-border:#555; --barcode-bg:#e6efe7; --barcode-text:#1f2b21; --social-bg:#2a2f2d; --social-hover:#3a413f; --logo-filter:brightness(1.15) saturate(1.2); }
    body.theme-ocean    { --bg:#0d1520; --card:#111e30; --text:#c8ddfa; --text-sub:#4a6080; --accent:#3a8eff; --accent-hover:#1a70f0; --btn-bg:#162035; --btn-border:#2a4060; --barcode-bg:#ddeeff; --barcode-text:#061428; --social-bg:#162035; --social-hover:#1e2e48; --logo-filter:brightness(1.2) hue-rotate(160deg) saturate(1.8); }
    body.theme-violet   { --bg:#130e1f; --card:#1c1428; --text:#e0d4f8; --text-sub:#6a5080; --accent:#a066e8; --accent-hover:#8244d4; --btn-bg:#261b3a; --btn-border:#4a3060; --barcode-bg:#f0e8ff; --barcode-text:#1a0a30; --social-bg:#261b3a; --social-hover:#32244e; --logo-filter:brightness(1.2) hue-rotate(260deg) saturate(2); }
    body.theme-ember    { --bg:#1c0e0a; --card:#251410; --text:#f8d4c0; --text-sub:#8a5040; --accent:#e8572a; --accent-hover:#c83c14; --btn-bg:#351810; --btn-border:#6a3020; --barcode-bg:#ffe8d8; --barcode-text:#2a0e04; --social-bg:#351810; --social-hover:#46221a; --logo-filter:brightness(1.2) hue-rotate(100deg) saturate(2.2); }
    body.theme-arctic   { --bg:#091518; --card:#0d1e22; --text:#b8eee8; --text-sub:#3a7068; --accent:#00c4b4; --accent-hover:#00a898; --btn-bg:#102428; --btn-border:#1e4848; --barcode-bg:#d4f8f4; --barcode-text:#041414; --social-bg:#102428; --social-hover:#163438; --logo-filter:brightness(1.2) hue-rotate(140deg) saturate(2); }
    body.theme-obsidian { --bg:#141618; --card:#1a1c20; --text:#d0d8e4; --text-sub:#505868; --accent:#a0aec0; --accent-hover:#8090a8; --btn-bg:#242830; --btn-border:#404858; --barcode-bg:#e8ecf4; --barcode-text:#101418; --social-bg:#242830; --social-hover:#303840; --logo-filter:brightness(1.05) saturate(0.25) contrast(1.15); }
    body.theme-mint     { --bg:#f3faf4; --card:#ffffff; --text:#1f2b21; --text-sub:#6a8a6e; --accent:#2e9e58; --accent-hover:#227840; --btn-bg:#e4f4e6; --btn-border:#b0d8b8; --barcode-bg:#d4eeda; --barcode-text:#0e2018; --social-bg:#e4f4e6; --social-hover:#cfebd4; --logo-filter:brightness(0.22) saturate(1.6); }
    body.theme-golden   { --bg:#fffaf2; --card:#ffffff; --text:#3a2000; --text-sub:#9a7040; --accent:#d97a18; --accent-hover:#b86010; --btn-bg:#faeede; --btn-border:#e8c898; --barcode-bg:#fde8c8; --barcode-text:#2a1400; --social-bg:#faeede; --social-hover:#f5e0c0; --logo-filter:brightness(0.18) sepia(0.8) saturate(3) hue-rotate(20deg); }
    body.theme-cherry   { --bg:#fff0f5; --card:#ffffff; --text:#4a0020; --text-sub:#9a6070; --accent:#e0436a; --accent-hover:#c82850; --btn-bg:#fce8ef; --btn-border:#f0b0c8; --barcode-bg:#ffd8e8; --barcode-text:#3a001a; --social-bg:#fce8ef; --social-hover:#f8d0e0; --logo-filter:brightness(0.18) sepia(1) saturate(6) hue-rotate(300deg); }
    body.theme-lavender { --bg:#f8f5ff; --card:#ffffff; --text:#2a1a50; --text-sub:#7a68a0; --accent:#7c4ddb; --accent-hover:#6038c0; --btn-bg:#ede8fc; --btn-border:#c8b8f0; --barcode-bg:#e8e0ff; --barcode-text:#18083a; --social-bg:#ede8fc; --social-hover:#e0d8f8; --logo-filter:brightness(0.2) sepia(1) saturate(5) hue-rotate(240deg); }
    body.theme-peach    { --bg:#fff7f2; --card:#ffffff; --text:#3a1800; --text-sub:#a06040; --accent:#e8733a; --accent-hover:#cc5820; --btn-bg:#faeade; --btn-border:#f0c0a0; --barcode-bg:#fde0c8; --barcode-text:#2a0e00; --social-bg:#faeade; --social-hover:#f5d8c0; --logo-filter:brightness(0.18) sepia(1) saturate(4) hue-rotate(60deg); }
    body.theme-sky      { --bg:#f0f8ff; --card:#ffffff; --text:#0a1e38; --text-sub:#5880a8; --accent:#1a90d4; --accent-hover:#0070b8; --btn-bg:#e0f0fc; --btn-border:#a8d0ee; --barcode-bg:#d0e8f8; --barcode-text:#041428; --social-bg:#e0f0fc; --social-hover:#cce4f5; --logo-filter:brightness(0.2) saturate(1.8) hue-rotate(160deg); }

    body.theme-mint input, body.theme-golden input, body.theme-cherry input,
    body.theme-lavender input, body.theme-peach input, body.theme-sky input { color: var(--text); }
  </style>
</head>

<body class="theme-forest">

<!-- ═══ SCANNER OVERLAY ═══ -->
<div class="scanner-overlay" id="scannerOverlay" onclick="closeScannerFromOverlay(event)"></div>

<div class="scanner-modal" id="scannerModal">
  <div class="scanner-header">
    <div class="scanner-title">
      <!-- Camera SVG -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Scan Barcode
    </div>
    <button class="scanner-close" onclick="closeScanner()">✕</button>
  </div>

  <div class="video-wrap">
    <video id="scannerVideo" autoplay muted playsinline></video>
    <div class="scan-guide"><div class="scan-guide-inner"></div></div>
    <div class="scan-line"></div>
  </div>

  <div class="scanner-status" id="scannerStatus">Point camera at a barcode...</div>

  <div class="camera-select-wrap" id="cameraSelectWrap" style="display:none;">
    <select id="cameraSelect" onchange="switchCamera()">
    </select>
  </div>
</div>

<!-- ═══ THEME OVERLAY ═══ -->
<div class="theme-overlay" id="themeOverlay" onclick="closeThemePanel()"></div>

<!-- ═══ THEME PANEL ═══ -->
<div class="theme-panel" id="themePanel">
  <div class="theme-panel-header">
    <div class="theme-panel-title">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
        <polygon points="12,2 22,20 2,20" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="none"/>
        <line x1="12" y1="2" x2="12" y2="20" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2" opacity="0.45"/>
        <line x1="12" y1="20" x2="21" y2="20" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="2"  y1="20" x2="9"  y2="20" stroke="#3a8eff"      stroke-width="2.5" stroke-linecap="round"/>
      </svg>

<!-- ZXing barcode reader library -->
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<script>
  /* ══════════════════════════════════════
     SCANNER
     Uses decodeFromConstraints with facingMode:environment
     — works on iOS Safari, Android Chrome, desktop.
     Avoids listVideoInputDevices() which fails on iOS
     before camera permission is granted.
  ══════════════════════════════════════ */
  let codeReader = null;
  let scanning   = false;

  function openScanner() {
    document.getElementById('scannerOverlay').classList.add('open');
    document.getElementById('scannerModal').classList.add('open');
    setStatus('Starting camera…', '');
    startScanner();
  }

  function closeScannerFromOverlay(e) {
    if (e.target === document.getElementById('scannerOverlay')) closeScanner();
  }

  function closeScanner() {
    stopScanner();
    document.getElementById('scannerOverlay').classList.remove('open');
    document.getElementById('scannerModal').classList.remove('open');
    setStatus('Point camera at a barcode...', '');
  }

  function setStatus(msg, cls) {
    const el = document.getElementById('scannerStatus');
    el.textContent = msg;
    el.className = 'scanner-status' + (cls ? ' ' + cls : '');
  }

  function startScanner() {
    if (!window.ZXing) {
      setStatus('Scanner library not loaded.', 'error');
      return;
    }

    // Check getUserMedia is available (needed for HTTPS / modern browsers)
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStatus('Camera not supported on this browser.', 'error');
      return;
    }

    try {
      codeReader = new ZXing.BrowserMultiFormatReader();
      scanning = true;

      // Request rear camera directly via facingMode — no device enumeration
      // needed, so iOS Safari grants permission properly.
      const constraints = {
        video: {
          facingMode: { ideal: 'environment' },
          width:  { ideal: 1280 },
          height: { ideal: 720 }
        }
      };

      setStatus('Point camera at a barcode...', '');

      codeReader.decodeFromConstraints(constraints, 'scannerVideo', (result, err) => {
        if (!scanning) return;

        if (result) {
          const raw    = result.getText();
          const digits = raw.replace(/\D/g, '');
          // Accept EAN-13 (13 digits) or EAN-8 / UPC-E (8 digits)
          const match  = digits.match(/(\d{13}|\d{8})/);
          if (match) {
            const code = match[1];
            document.getElementById('productCode').value = code;
            setStatus('✓ Got it: ' + code, 'success');
            scanning = false;
            setTimeout(closeScanner, 850);
          }
        }

        // ZXing fires err on every frame with no barcode — safe to ignore
        if (err && !(err instanceof ZXing.NotFoundException)) {
          console.warn('ZXing:', err);
        }
      });

    } catch (err) {
      console.error(err);
      handleCameraError(err);
    }
  }

  function handleCameraError(err) {
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      setStatus('Camera permission denied. Check browser settings.', 'error');
    } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
      setStatus('No camera found on this device.', 'error');
    } else if (err.name === 'NotReadableError') {
      setStatus('Camera is in use by another app.', 'error');
    } else if (err.name === 'OverconstrainedError') {
      // Rear camera not available — retry with any camera
      retryWithAnyCamera();
    } else {
      setStatus('Could not start camera.', 'error');
    }
  }

  function retryWithAnyCamera() {
    try {
      codeReader = new ZXing.BrowserMultiFormatReader();
      scanning = true;
      setStatus('Point camera at a barcode...', '');
      codeReader.decodeFromConstraints({ video: true }, 'scannerVideo', (result, err) => {
        if (!scanning) return;
        if (result) {
          const digits = result.getText().replace(/\D/g, '');
          const match  = digits.match(/(\d{13}|\d{8})/);
          if (match) {
            document.getElementById('productCode').value = match[1];
            setStatus('✓ Got it: ' + match[1], 'success');
            scanning = false;
            setTimeout(closeScanner, 850);
          }
        }
      });
    } catch (e) {
      setStatus('Could not access camera.', 'error');
    }
  }

  function stopScanner() {
    scanning = false;
    if (codeReader) {
      try { codeReader.reset(); } catch (e) {}
      codeReader = null;
    }
    // Belt-and-braces: kill any live tracks directly
    const video = document.getElementById('scannerVideo');
    if (video && video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
      video.srcObject = null;
    }
  }

  // Unused but kept so HTML onclick doesn't error if called
  function switchCamera() {}

  /* ══════════════════════════════════════
     THEME
  ══════════════════════════════════════ */
  function openThemePanel() {
    document.getElementById('themeOverlay').classList.add('open');
    document.getElementById('themePanel').classList.add('open');
  }

  function closeThemePanel() {
    document.getElementById('themeOverlay').classList.remove('open');
    document.getElementById('themePanel').classList.remove('open');
  }

  const ALL_THEMES = ['forest','ocean','violet','ember','arctic','obsidian','mint','golden','cherry','lavender','peach','sky'];

  function applyTheme(name, card) {
    ALL_THEMES.forEach(t => document.body.classList.remove('theme-' + t));
    document.body.classList.add('theme-' + name);
    document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    setTimeout(closeThemePanel, 240);
  }

  document.addEventListener('DOMContentLoaded', () => {
    const def = document.querySelector('.theme-card[data-theme="forest"]');
    if (def) def.classList.add('active');
  });

  /* ══════════════════════════════════════
     BARCODE GENERATOR
  ══════════════════════════════════════ */
  function copyText(text, el) {
    navigator.clipboard.writeText(text);
    const msg = el.querySelector(".copy-msg");
    msg.style.display = "inline";
    setTimeout(() => msg.style.display = "none", 1200);
  }

  function padLeft(str, length) { return str.toString().padStart(length, '0'); }

  function calculateCheckDigit(input) {
    let sum = 0;
    for (let i = 0; i < input.length; i++) {
      const digit = parseInt(input[input.length - 1 - i], 10);
      sum += digit * ((i % 2 === 0) ? 3 : 1);
    }
    return (10 - (sum % 10)) % 10;
  }

  function formatPrice(pence) {
    const p = parseInt(pence, 10);
    if (isNaN(p) || p <= 0) return '';
    if (p < 100) return p + 'p';
    const pounds = Math.floor(p / 100);
    const rem = p % 100;
    return rem === 0 ? `£${pounds}.00` : `£${pounds}.${String(rem).padStart(2,'0')}`;
  }

  function generateBarcode() {
    const productInput = document.getElementById('productCode').value;
    const priceInput   = document.getElementById('price').value;
    const labelInput   = document.getElementById('barcodeLabelInput').value;

    if (!productInput || productInput.length < 8) {
      alert("Enter a valid barcode (at least 8 digits).");
      return;
    }

    document.getElementById("barcodeLabel").innerText = labelInput;
    document.getElementById("barcodePrice").innerText = formatPrice(priceInput);

    const numericProduct = productInput.replace(/\D/g, '');
    let productDigits = numericProduct.length === 14 ? numericProduct.slice(0, -1) : numericProduct;
    productDigits = padLeft(productDigits, 13);

    const paddedPrice = padLeft(priceInput, 6);
    const baseNumber  = `91${productDigits}${paddedPrice}`;
    const checkDigit  = calculateCheckDigit(baseNumber);
    const fullBarcode = `${baseNumber}${checkDigit}`;

    JsBarcode("#barcodeCanvas", fullBarcode, {
      format: "CODE128",
      displayValue: true,
      fontSize: 8,
      width: 2,
      height: 80,
      margin: 5
    });
  }

  function setPriceAndGenerate(pence) {
    document.getElementById('price').value = pence;
    document.getElementById('customPriceContainer').style.display = 'none';
    generateBarcode();
  }

  function showCustomPrice() {
    document.getElementById('customPriceContainer').style.display = 'block';
  }
</script>
