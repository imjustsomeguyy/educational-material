<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sainsbury's Barcode Generator - 55</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #1a1f1c;
      color: #dfeee0;
      margin: 0;
      padding: 1rem;
      text-align: center;
      transition: background 0.5s, color 0.5s;
    }

    .container {
      background: #222827;
      color: #dfeee0;
      padding: 1.5rem;
      border-radius: 1rem;
      max-width: 450px;
      margin: auto;
      box-shadow: 0 20px rgba(0,0,0,0.5);
    }

    img {
      max-width: 100%;
      height: auto;
      filter: brightness(1.2);
    }

    input, button, select {
      padding: 0.6rem;
      margin: 0.5rem 0;
      font-size: 0.8rem;
      border-radius: 0.5rem;
      border: none;
    }

    input[type="text"], input[type="number"] {
      width: calc(100% - 1rem);
    }

    button.price-button {
      background: #68b06a;
      color: #ffffff;
      margin: 0.3rem;
      cursor: pointer;
    }

    .barcode-frame {
      background: #e6efe7;
      padding: 1rem;
      border-radius: 0.8rem;
      margin-top: 1rem;
    }

    .barcode-label {
      font-size: 0.9rem;
      margin-bottom: 0.3rem;
      color: #1f2b21;
      font-weight: bold;
    }

    canvas {
      max-width: 100%;
    }

    /* ✅ WATERMARK HALF SIZE */
    .watermark {
      color: #6b7c6e;
      margin-top: 0.5rem;
      font-size: 0.5rem;
      line-height: 1.2;
    }

    .socials {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .social-item {
      background: #2a2f2d;
      padding: 0.5rem 0.8rem;
      border-radius: 0.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
    }

    .copy-msg {
      font-size: 0.7rem;
      color: #68b06a;
      display: none;
    }

    .bottom-image {
      margin-top: 15px;
      max-width: 120px;
      width: 100%;
      opacity: 0.9;
    }

    /* ✅ THEMES */
    body.light {
      background: #f3faf4;
      color: #1f2b21;
    }

    body.light .container {
      background: #ffffff;
      color: #1f2b21;
    }

    body.green {
      background: #0f1f14;
      color: #b7e4c7;
    }

    body.green .container {
      background: #163524;
    }

  </style>
</head>

<body>

<div class="container">
  <img src="Sainsbury's_idRe1DHyjA_1.png" alt="Sainsbury's Logo" />

  <input type="text" id="productCode" placeholder="Enter 13 or 8 digit barcode" maxlength="13"
         oninput="this.value=this.value.replace(/\D/g,'').slice(0,13)" />

  <input type="text" id="barcodeLabelInput" placeholder="Enter label for barcode" maxlength="30" />

  <div>
    <button class="price-button" onclick="setPriceAndGenerate(10)">10p</button>
    <button class="price-button" onclick="setPriceAndGenerate(49)">49p</button>
    <button class="price-button" onclick="setPriceAndGenerate(100)">£1</button>
    <button class="price-button" onclick="showCustomPrice()">Custom</button>
  </div>

  <div id="customPriceContainer" style="display:none;">
    <input type="number" id="price" placeholder="Enter price in pence" min="1" max="9999" />
    <button onclick="generateBarcode()">Generate Barcode</button>
  </div>

  <div class="barcode-frame">
    <div id="barcodeLabel" class="barcode-label"></div>
    <canvas id="barcodeCanvas" width="400" height="150"></canvas>
    <div class="watermark">
      EasyP55 little fraud boy bbancm <br>
      oli got caught by co-op police <br>
      fuhhh paying full price
    </div>
  </div>

  <div class="socials">
    <div class="social-item" onclick="copyText('imjustsomeguyy', this)">
      imjustsomeguyy <span class="copy-msg">Copied!</span>
    </div>

    <div class="social-item" onclick="copyText('somerandomahguy', this)">
      somerandomahguy <span class="copy-msg">Copied!</span>
    </div>
  </div>

  <!-- ✅ NEW THEME MENU -->
  <select onchange="setTheme(this.value)">
    <option value="">Dark (Default)</option>
    <option value="light">Light</option>
    <option value="green">Green</option>
  </select>

  <img src="methodtriad.png" class="bottom-image" />

</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<script>
function copyText(text, el) {
  navigator.clipboard.writeText(text);
  const msg = el.querySelector(".copy-msg");
  msg.style.display = "inline";
  setTimeout(() => msg.style.display = "none", 1200);
}

function padLeft(str, length) {
  return str.toString().padStart(length, '0');
}

function calculateCheckDigit(input) {
  let sum = 0;
  for (let i = 0; i < input.length; i++) {
    const digit = parseInt(input[input.length - 1 - i], 10);
    const weight = (i % 2 === 0) ? 3 : 1;
    sum += digit * weight;
  }
  return (10 - (sum % 10)) % 10;
}

function generateBarcode() {
  const productInput = document.getElementById('productCode').value;
  const priceInput = document.getElementById('price').value;
  const labelInput = document.getElementById('barcodeLabelInput').value;

  if (!productInput || productInput.length < 8) {
    alert("Enter a valid barcode (at least 8 digits).");
    return;
  }

  document.getElementById("barcodeLabel").innerText = labelInput;

  const numericProduct = productInput.replace(/\D/g, '');
  let productDigits = numericProduct.length === 14 ? numericProduct.slice(0, -1) : numericProduct;
  productDigits = padLeft(productDigits, 13);

  const paddedPrice = padLeft(priceInput, 6);
  const baseNumber = `91${productDigits}${paddedPrice}`;
  const checkDigit = calculateCheckDigit(baseNumber);
  const fullBarcode = `${baseNumber}${checkDigit}`;

  JsBarcode("#barcodeCanvas", fullBarcode, {
    format: "CODE128",
    displayValue: true,
    fontSize: 8,
    width: 2,
    height: 80,
    margin: 5
  });
}

function setPriceAndGenerate(pence) {
  document.getElementById('price').value = pence;
  document.getElementById('customPriceContainer').style.display = 'none';
  generateBarcode();
}

function showCustomPrice() {
  document.getElementById('customPriceContainer').style.display = 'block';
}

/* ✅ NEW THEME SWITCHER */
function setTheme(theme) {
  document.body.className = theme;
}
</script>

</body>
</html>
